<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tricks">
<title>Trick Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;}
::-webkit-scrollbar{display:none;}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const NTFY="elijah-tarjm-x7k2m9";
const BG="#0a0a0a",S="#111",BD="#1a1a1a",T="#f0f0f0",M="#666",G="#444",A="#c8ff00";

const STATUSES=[
  {id:"never",      label:"Never Tried",      color:"#333",    short:"NEVER"},
  {id:"working",    label:"Working On",        color:"#ffaa00", short:"WORKING"},
  {id:"close",      label:"Close",             color:"#ff6600", short:"CLOSE"},
  {id:"landed",     label:"Landed",            color:"#c8ff00", short:"LANDED"},
  {id:"consistent", label:"Consistent",        color:"#44ff88", short:"CONSIST"},
  {id:"clean",      label:"Consistent Clean",  color:"#00ffff", short:"CLEAN"},
];
const STATUS_ORDER=["never","working","close","landed","consistent","clean"];

const CATS=[
  {id:"flat",  name:"Flatground", color:"#c8ff00"},
  {id:"grind", name:"Grinds",     color:"#ffaa00"},
  {id:"manual",name:"Manuals",    color:"#44ff88"},
  {id:"tranny",name:"Transitions",color:"#ff6644"},
];

const DEFAULT_TRICKS=[
  {id:"ollie",      name:"Ollie",           cat:"flat",  status:"consistent",notes:"Foundation"},
  {id:"fakie_ollie",name:"Fakie Ollie",     cat:"flat",  status:"working",   notes:""},
  {id:"nollie",     name:"Nollie",          cat:"flat",  status:"never",     notes:""},
  {id:"sw_ollie",   name:"Switch Ollie",    cat:"flat",  status:"never",     notes:""},
  {id:"kickflip",   name:"Kickflip",        cat:"flat",  status:"landed",    notes:"Landed Feb 2026"},
  {id:"heelflip",   name:"Heelflip",        cat:"flat",  status:"working",   notes:""},
  {id:"bs180",      name:"Backside 180",    cat:"flat",  status:"consistent",notes:""},
  {id:"fs180",      name:"Frontside 180",   cat:"flat",  status:"working",   notes:""},
  {id:"pop_shove",  name:"Pop Shove-it",    cat:"flat",  status:"consistent",notes:""},
  {id:"fs_shove",   name:"FS Shove-it",     cat:"flat",  status:"never",     notes:""},
  {id:"fk360shove", name:"Fakie 360 Shove", cat:"flat",  status:"consistent",notes:""},
  {id:"varial",     name:"Varial Kickflip", cat:"flat",  status:"working",   notes:""},
  {id:"var_heel",   name:"Varial Heelflip", cat:"flat",  status:"never",     notes:""},
  {id:"hardflip",   name:"Hardflip",        cat:"flat",  status:"never",     notes:""},
  {id:"treflip",    name:"360 Flip",        cat:"flat",  status:"never",     notes:""},
  {id:"bs360",      name:"Backside 360",    cat:"flat",  status:"never",     notes:""},
  {id:"fs360",      name:"Frontside 360",   cat:"flat",  status:"never",     notes:""},
  {id:"fifty",      name:"50-50",           cat:"grind", status:"consistent",notes:"First at Kroger"},
  {id:"five_o",     name:"5-0",             cat:"grind", status:"never",     notes:""},
  {id:"nosegrind",  name:"Nosegrind",       cat:"grind", status:"never",     notes:""},
  {id:"bs_smith",   name:"BS Smith",        cat:"grind", status:"never",     notes:""},
  {id:"fs_smith",   name:"FS Smith",        cat:"grind", status:"never",     notes:""},
  {id:"bs_board",   name:"BS Boardslide",   cat:"grind", status:"never",     notes:""},
  {id:"fs_board",   name:"FS Boardslide",   cat:"grind", status:"never",     notes:""},
  {id:"crook",      name:"Crooked Grind",   cat:"grind", status:"never",     notes:""},
  {id:"manual",     name:"Manual",          cat:"manual",status:"working",   notes:""},
  {id:"nose_man",   name:"Nose Manual",     cat:"manual",status:"never",     notes:""},
  {id:"drop_in",    name:"Drop In",         cat:"tranny",status:"consistent",notes:""},
  {id:"rock_fakie", name:"Rock to Fakie",   cat:"tranny",status:"never",     notes:""},
];

const ld=(k)=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const todayStr=()=>new Date().toISOString().slice(0,10);
function daysSince(d){if(!d)return null;return Math.floor((new Date()-new Date(d+"T12:00:00"))/(864e5));}
async function ping(title,msg,tags){try{await fetch("https://ntfy.sh/"+NTFY,{method:"POST",body:msg,headers:{Title:title,Priority:"3",Tags:tags||"skateboard"}});}catch{}}

function App(){
  const [tricks,setTricks]=useState(()=>{
    const saved=ld("tricks");
    if(saved)return saved;
    return DEFAULT_TRICKS.map(t=>({...t,sessions:[],landedDate:t.status==="consistent"||t.status==="clean"||t.status==="landed"?todayStr():null,lastWorked:null}));
  });
  const [screen,setScreen]=useState("home");
  const [selectedId,setSelectedId]=useState(null);
  const [filterCat,setFilterCat]=useState("all");
  const [filterStatus,setFilterStatus]=useState("all");
  const [sessionNote,setSessionNote]=useState("");
  const [showSession,setShowSession]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [newTrick,setNewTrick]=useState({name:"",cat:"flat",notes:""});
  const [search,setSearch]=useState("");

  function saveTricks(t){setTricks(t);sv("tricks",t);}

  function updateStatus(id,ns){
    const u=tricks.map(t=>{
      if(t.id!==id)return t;
      const wasL=t.status==="landed"||t.status==="locked";
      const nowL=ns==="landed"||ns==="locked";
      return{...t,status:ns,landedDate:nowL&&!wasL?todayStr():t.landedDate};
    });
    saveTricks(u);
    const trick=tricks.find(t=>t.id===id);
    const st=STATUSES.find(s=>s.id===ns);
    ping(trick.name+" status update",trick.name+" is now "+st.label,"skateboard");
  }

  function logSession(id){
    const u=tricks.map(t=>{
      if(t.id!==id)return t;
      return{...t,sessions:[{date:todayStr(),note:sessionNote},...(t.sessions||[])],lastWorked:todayStr()};
    });
    saveTricks(u);
    const trick=tricks.find(t=>t.id===id);
    ping("Worked on "+trick.name,sessionNote||"Session logged","skateboard");
    setSessionNote("");setShowSession(false);
  }

  function addTrick(){
    if(!newTrick.name.trim())return;
    const t={...newTrick,id:"c"+Date.now(),status:"never",sessions:[],landedDate:null,lastWorked:null};
    const u=[...tricks,t];saveTricks(u);
    setNewTrick({name:"",cat:"flat",notes:""});setShowAdd(false);
  }

  function deleteTrick(id){saveTricks(tricks.filter(t=>t.id!==id));setScreen("home");}

  const selected=tricks.find(t=>t.id===selectedId);
  const filtered=useMemo(()=>tricks.filter(t=>{
    if(filterCat!=="all"&&t.cat!==filterCat)return false;
    if(filterStatus!=="all"&&t.status!==filterStatus)return false;
    if(search&&!t.name.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  }),[tricks,filterCat,filterStatus,search]);

  const neglected=tricks.filter(t=>(t.status==="working"||t.status==="close")&&(daysSince(t.lastWorked)===null||daysSince(t.lastWorked)>=7));
  const locked=tricks.filter(t=>t.status==="consistent"||t.status==="clean").length;
  const working=tricks.filter(t=>t.status==="working"||t.status==="close").length;
  const total=tricks.length;

  const mono=(ex={})=>({fontFamily:"Space Mono",fontSize:10,letterSpacing:2,color:G,...ex});
  const row=(ex={})=>({display:"flex",alignItems:"center",...ex});

  function Badge({status,small}){
    const s=STATUSES.find(x=>x.id===status)||STATUSES[0];
    return <span style={{fontFamily:"Space Mono",fontSize:small?8:9,letterSpacing:1,color:s.color,background:s.color+"18",border:"1px solid "+s.color+"44",borderRadius:6,padding:small?"3px 6px":"4px 8px",flexShrink:0}}>{s.short}</span>;
  }

  // ADD
  if(showAdd)return(
    <div style={{background:BG,color:T,minHeight:"100vh",fontFamily:"Syne,sans-serif",padding:"44px 24px 40px",maxWidth:480,margin:"0 auto"}}>
      <div style={{...row({justifyContent:"space-between"}),marginBottom:28}}>
        <div style={{fontSize:22,fontWeight:800}}>Add Trick</div>
        <button onClick={()=>setShowAdd(false)} style={mono({background:"none",border:"1px solid "+BD,borderRadius:8,padding:"8px 14px",cursor:"pointer"})}>CANCEL</button>
      </div>
      <div style={{marginBottom:16}}>
        <div style={mono({display:"block",marginBottom:8})}>TRICK NAME</div>
        <input value={newTrick.name} onChange={e=>setNewTrick({...newTrick,name:e.target.value})} placeholder="e.g. Kickflip to Manual"
          style={{width:"100%",background:S,border:"1px solid "+BD,borderRadius:10,padding:"14px",color:T,fontFamily:"Syne",fontSize:15,outline:"none"}}/>
      </div>
      <div style={{marginBottom:16}}>
        <div style={mono({display:"block",marginBottom:8})}>CATEGORY</div>
        <div style={row({gap:8,flexWrap:"wrap"})}>
          {CATS.map(c=>(
            <button key={c.id} onClick={()=>setNewTrick({...newTrick,cat:c.id})}
              style={{padding:"8px 16px",borderRadius:8,cursor:"pointer",fontFamily:"Space Mono",fontSize:9,letterSpacing:1,border:"1px solid "+(newTrick.cat===c.id?c.color:BD),background:newTrick.cat===c.id?c.color+"18":"transparent",color:newTrick.cat===c.id?c.color:M}}>
              {c.name.toUpperCase()}
            </button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:28}}>
        <div style={mono({display:"block",marginBottom:8})}>NOTES</div>
        <input value={newTrick.notes} onChange={e=>setNewTrick({...newTrick,notes:e.target.value})} placeholder="optional"
          style={{width:"100%",background:S,border:"1px solid "+BD,borderRadius:10,padding:"14px",color:T,fontFamily:"Syne",fontSize:14,outline:"none"}}/>
      </div>
      <button onClick={addTrick} style={{width:"100%",background:A,color:"#000",border:"none",borderRadius:14,padding:20,fontFamily:"Syne",fontWeight:800,fontSize:16,cursor:"pointer"}}>ADD TRICK</button>
    </div>
  );

  // DETAIL
  if(screen==="detail"&&selected){
    const s=STATUSES.find(x=>x.id===selected.status)||STATUSES[0];
    const cat=CATS.find(c=>c.id===selected.cat);
    const ds=daysSince(selected.lastWorked);
    const isNeg=(selected.status==="working"||selected.status==="close")&&(ds===null||ds>=7);
    const statusIdx=STATUS_ORDER.indexOf(selected.status);
    return(
      <div style={{background:BG,color:T,minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Syne,sans-serif",maxWidth:480,margin:"0 auto"}}>
        <div style={{padding:"44px 24px 20px",...row({justifyContent:"space-between"})}}>
          <button onClick={()=>{setScreen("home");setShowSession(false);}} style={mono({background:"none",border:"1px solid "+BD,borderRadius:8,padding:"8px 14px",cursor:"pointer"})}>← BACK</button>
          <button onClick={()=>deleteTrick(selected.id)} style={mono({background:"none",border:"1px solid #ff4444",borderRadius:8,padding:"8px 14px",cursor:"pointer",color:"#ff4444"})}>DELETE</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 24px 40px"}}>
          <div style={{marginBottom:24}}>
            <div style={mono({color:cat?.color,display:"block",marginBottom:8})}>{cat?.name.toUpperCase()}</div>
            <div style={{fontSize:28,fontWeight:800,marginBottom:12}}>{selected.name}</div>
            <Badge status={selected.status}/>
            {selected.landedDate&&<div style={mono({display:"block",marginTop:8,color:"#44ff88"})}>LANDED {selected.landedDate}</div>}
            {isNeg&&<div style={{fontFamily:"Space Mono",fontSize:10,color:"#ff4444",letterSpacing:1,marginTop:8}}>NEGLECTED — {ds===null?"never worked on":ds+"d without a session"}</div>}
          </div>
          <div style={{marginBottom:24}}>
            <div style={mono({display:"block",marginBottom:12})}>STATUS</div>
            <div style={{display:"flex",gap:4}}>
              {STATUSES.map(st=>(
                <button key={st.id} onClick={()=>updateStatus(selected.id,st.id)}
                  style={{flex:1,padding:"10px 0",borderRadius:8,cursor:"pointer",fontFamily:"Space Mono",fontSize:8,border:"1px solid "+(selected.status===st.id?st.color:BD),background:selected.status===st.id?st.color+"22":"transparent",color:selected.status===st.id?st.color:G,lineHeight:1.3}}>
                  {st.short}
                </button>
              ))}
            </div>
            <div style={{height:3,background:BD,borderRadius:2,marginTop:10}}>
              <div style={{height:"100%",width:(statusIdx/4*100)+"%",background:s.color,borderRadius:2,transition:"width 0.4s"}}/>
            </div>
          </div>
          <div style={{background:S,border:"1px solid "+BD,borderRadius:16,padding:20,marginBottom:20}}>
            <div style={mono({display:"block",marginBottom:12})}>LOG SESSION</div>
            {showSession?(
              <>
                <input value={sessionNote} onChange={e=>setSessionNote(e.target.value)} placeholder="What happened? Close? Issues?"
                  style={{width:"100%",background:BG,border:"1px solid "+BD,borderRadius:10,padding:"12px",color:T,fontFamily:"Syne",fontSize:13,outline:"none",marginBottom:10}}/>
                <div style={row({gap:8})}>
                  <button onClick={()=>logSession(selected.id)} style={{flex:1,background:A,color:"#000",border:"none",borderRadius:10,padding:"13px",fontFamily:"Syne",fontWeight:800,fontSize:13,cursor:"pointer"}}>LOG IT</button>
                  <button onClick={()=>setShowSession(false)} style={{flex:0.5,background:"none",color:G,border:"1px solid "+BD,borderRadius:10,padding:"13px",fontFamily:"Syne",cursor:"pointer"}}>CANCEL</button>
                </div>
              </>
            ):(
              <button onClick={()=>setShowSession(true)} style={{width:"100%",background:A,color:"#000",border:"none",borderRadius:10,padding:"14px",fontFamily:"Syne",fontWeight:800,fontSize:14,cursor:"pointer"}}>
                WORKED ON THIS TODAY →
              </button>
            )}
            {selected.lastWorked&&<div style={mono({display:"block",marginTop:10,textAlign:"center"})}>Last: {ds===0?"today":ds===1?"yesterday":ds+"d ago"}</div>}
          </div>
          {selected.sessions&&selected.sessions.length>0&&(
            <div>
              <div style={mono({display:"block",marginBottom:12})}>SESSIONS ({selected.sessions.length})</div>
              {selected.sessions.slice(0,20).map((sess,i)=>(
                <div key={i} style={{...row({gap:12}),padding:"10px 0",borderBottom:"1px solid "+BD}}>
                  <div style={mono({color:A,flexShrink:0})}>{sess.date}</div>
                  <div style={{fontSize:13,color:sess.note?T:G}}>{sess.note||"Session logged"}</div>
                </div>
              ))}
            </div>
          )}
          {selected.notes&&<div style={{marginTop:20,background:S,border:"1px solid "+BD,borderRadius:12,padding:16}}><div style={mono({display:"block",marginBottom:6})}>NOTES</div><div style={{fontSize:13,color:M}}>{selected.notes}</div></div>}
        </div>
      </div>
    );
  }

  // TIMELINE
  if(screen==="timeline"){
    const milestones=tricks.filter(t=>t.landedDate||(t.sessions&&t.sessions.length)).map(t=>({trick:t.name,date:t.landedDate||t.sessions[t.sessions.length-1]?.date,type:t.landedDate?"landed":"session",status:t.status})).sort((a,b)=>new Date(b.date)-new Date(a.date));
    return(
      <div style={{background:BG,color:T,minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Syne,sans-serif",maxWidth:480,margin:"0 auto"}}>
        <div style={{padding:"44px 24px 20px",...row({gap:16})}}>
          <button onClick={()=>setScreen("home")} style={mono({background:"none",border:"1px solid "+BD,borderRadius:8,padding:"8px 14px",cursor:"pointer"})}>← BACK</button>
          <div><div style={mono({display:"block",marginBottom:4})}>PROGRESSION</div><div style={{fontSize:20,fontWeight:800}}>Timeline</div></div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 24px 40px"}}>
          {milestones.length===0&&<div style={{textAlign:"center",padding:40,color:G,fontFamily:"Space Mono",fontSize:11}}>Log sessions to build your timeline.</div>}
          {milestones.map((m,i)=>{
            const s=STATUSES.find(x=>x.id===m.status)||STATUSES[0];
            return(
              <div key={i} style={{...row({gap:16,alignItems:"flex-start"}),marginBottom:20}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:m.type==="landed"?s.color:BD,border:"2px solid "+s.color}}/>
                  {i<milestones.length-1&&<div style={{width:2,height:40,background:BD,marginTop:4}}/>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:800,marginBottom:2}}>{m.trick}</div>
                  <div style={mono({color:s.color})}>{m.type==="landed"?"LANDED":"SESSION"} — {m.date}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // HOME
  return(
    <div style={{background:BG,color:T,minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Syne,sans-serif",maxWidth:480,margin:"0 auto"}}>
      <div style={{padding:"44px 24px 16px",...row({justifyContent:"space-between"})}}>
        <div><div style={mono({display:"block",marginBottom:6})}>WASABI</div><div style={{fontSize:28,fontWeight:800,lineHeight:1}}>Trick<br/><span style={{color:A}}>Tracker</span></div></div>
        <div style={{display:"flex",flexDirection:"column",gap:8,alignItems:"flex-end"}}>
          <button onClick={()=>setScreen("timeline")} style={mono({background:"none",border:"1px solid "+BD,borderRadius:8,padding:"8px 12px",cursor:"pointer"})}>TIMELINE →</button>
          <button onClick={()=>setShowAdd(true)} style={{background:A,color:"#000",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"Syne",fontWeight:800,fontSize:11,cursor:"pointer",letterSpacing:1}}>+ ADD</button>
        </div>
      </div>
      <div style={{...row({gap:8}),padding:"0 24px 16px"}}>
        {[[locked,"🔒","Consist+Clean"],[working,"🔧","Working"],[total,"📋","Total"]].map(([n,icon,label])=>(
          <div key={label} style={{flex:1,background:S,border:"1px solid "+BD,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontSize:16,marginBottom:3}}>{icon}</div>
            <div style={{fontFamily:"Space Mono",fontSize:20,fontWeight:700,color:T}}>{n}</div>
            <div style={mono({fontSize:8,marginTop:3})}>{label.toUpperCase()}</div>
          </div>
        ))}
      </div>
      {neglected.length>0&&(
        <div style={{margin:"0 20px 12px",background:"rgba(255,68,68,0.08)",border:"1px solid rgba(255,68,68,0.3)",borderRadius:12,padding:"12px 16px"}}>
          <div style={mono({color:"#ff4444",display:"block",marginBottom:6})}>NEGLECTED — {neglected.length} TRICK{neglected.length>1?"S":""}</div>
          <div style={{fontSize:12,color:"#ff8888"}}>{neglected.map(t=>t.name).join(", ")}</div>
        </div>
      )}
      <div style={{padding:"0 20px 10px"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="search tricks..."
          style={{width:"100%",background:S,border:"1px solid "+BD,borderRadius:10,padding:"11px 14px",color:T,fontFamily:"Syne",fontSize:13,outline:"none"}}/>
      </div>
      <div style={{overflowX:"auto",padding:"0 20px 8px",display:"flex",gap:6}}>
        {["all",...STATUSES.map(s=>s.id)].map(id=>{
          const s=STATUSES.find(x=>x.id===id);
          const isActive=filterStatus===id;
          return <button key={id} onClick={()=>setFilterStatus(id)} style={{flexShrink:0,padding:"6px 12px",borderRadius:8,cursor:"pointer",fontFamily:"Space Mono",fontSize:9,letterSpacing:1,border:"1px solid "+(isActive?(s?s.color:A):BD),background:isActive?(s?s.color:A)+"18":"transparent",color:isActive?(s?s.color:A):G}}>{id==="all"?"ALL":s?.short}</button>;
        })}
      </div>
      <div style={{overflowX:"auto",padding:"0 20px 14px",display:"flex",gap:6}}>
        {["all",...CATS.map(c=>c.id)].map(id=>{
          const c=CATS.find(x=>x.id===id);
          const isActive=filterCat===id;
          return <button key={id} onClick={()=>setFilterCat(id)} style={{flexShrink:0,padding:"6px 12px",borderRadius:8,cursor:"pointer",fontFamily:"Space Mono",fontSize:9,letterSpacing:1,border:"1px solid "+(isActive?(c?c.color:A):BD),background:isActive?(c?c.color:A)+"18":"transparent",color:isActive?(c?c.color:A):G}}>{id==="all"?"ALL CATS":c?.name.toUpperCase()}</button>;
        })}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 20px 32px"}}>
        {CATS.filter(c=>filterCat==="all"||filterCat===c.id).map(cat=>{
          const catT=filtered.filter(t=>t.cat===cat.id);
          if(!catT.length)return null;
          return(
            <div key={cat.id} style={{marginBottom:20}}>
              <div style={{...row({gap:8}),marginBottom:10}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:cat.color}}/>
                <span style={mono({color:cat.color})}>{cat.name.toUpperCase()}</span>
                <div style={{flex:1,height:1,background:BD}}/>
                <span style={mono()}>{catT.filter(t=>t.status==="consistent"||t.status==="clean").length}/{catT.length} locked</span>
              </div>
              {catT.map(t=>{
                const s=STATUSES.find(x=>x.id===t.status)||STATUSES[0];
                const ds=daysSince(t.lastWorked);
                const isNeg=(t.status==="working"||t.status==="close")&&(ds===null||ds>=7);
                return(
                  <div key={t.id} onClick={()=>{setSelectedId(t.id);setScreen("detail");setShowSession(false);}}
                    style={{...row({gap:12}),padding:"13px 14px",marginBottom:7,background:S,border:"1px solid "+(isNeg?"rgba(255,68,68,0.4)":BD),borderRadius:12,cursor:"pointer"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:T,marginBottom:4}}>{t.name}</div>
                      <div style={row({gap:8})}>
                        {t.sessions&&t.sessions.length>0&&<div style={mono({fontSize:9,color:G})}>{t.sessions.length} sessions</div>}
                        {isNeg&&<div style={mono({fontSize:9,color:"#ff4444"})}>neglected</div>}
                        {ds===0&&<div style={mono({fontSize:9,color:"#44ff88"})}>✓ today</div>}
                      </div>
                    </div>
                    <Badge status={t.status} small={true}/>
                    <span style={{color:G,fontSize:16}}>›</span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
