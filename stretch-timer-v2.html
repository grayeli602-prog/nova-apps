<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stretch">
<title>Stretch Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{display:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slidein{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const NTFY="elijah-tarjm-x7k2m9";
const CIRC=2*Math.PI*88;
const BG="#0a0a0a",S="#111",BD="#1a1a1a",T="#f0f0f0",M="#777",G="#444";

async function ping(title,msg,tags){
  try{await fetch("https://ntfy.sh/"+NTFY,{method:"POST",body:msg,headers:{Title:title,Priority:"3",Tags:tags||"person_in_lotus_position"}});}catch{}
}

// ── DEFAULT ROUTINES — sides:2 means run timer twice (each side) ──
const DEFAULTS = {
  pf: {
    id:"pf", name:"Pelvic Floor", emoji:"🧘", color:"#c8ff00",
    tag:"Daily PF protocol",
    stretches:[
      {id:"catcow",  name:"Cat-Cow",      emoji:"🐱", dur:120, sides:1, cue:"Breathe into lower belly. Pelvis rocks freely. Exhale fully each time."},
      {id:"butter",  name:"Butterfly",    emoji:"🦋", dur:180, sides:1, cue:"Feet together, knees drop. Let gravity do it. Don't push."},
      {id:"hipflex", name:"Hip Flexor",   emoji:"🦵", dur:90,  sides:2, cue:"Low lunge. Tuck pelvis under. Feel front of hip."},
      {id:"squat",   name:"Deep Squat",   emoji:"🏋️", dur:300, sides:1, cue:"Heels down if possible. Chest up. 5 minutes releases what 30 sec misses."},
      {id:"baby",    name:"Happy Baby",   emoji:"👶", dur:180, sides:1, cue:"Grab outer feet. Knees wide. Rock gently. Sacrum flat to the floor."},
      {id:"child",   name:"Child's Pose", emoji:"🙇", dur:180, sides:1, cue:"Arms forward. Breathe into back and pelvis. Reverse Kegel on every exhale."},
      {id:"dog",     name:"Downward Dog", emoji:"🐕", dur:120, sides:1, cue:"Pedal the heels. Spine decompresses. Posterior chain releases."},
    ]
  },
  pre_skate: {
    id:"pre_skate", name:"Pre-Skate", emoji:"🛹", color:"#ffaa00",
    tag:"Pre-skate warmup — PF friendly",
    stretches:[
      {id:"ankle",   name:"Ankle Circles",    emoji:"🔄", dur:30, sides:2, cue:"Full range both directions. Fluid in joint capsule."},
      {id:"hipcirc", name:"Hip Circles",      emoji:"🌀", dur:30, sides:2, cue:"Biggest circles you can make. Hips loose = better mechanics."},
      {id:"swing",   name:"Leg Swings F/B",   emoji:"🦵", dur:30, sides:2, cue:"Swing freely. Hip flexor and hamstring."},
      {id:"lswing",  name:"Leg Swings Side",  emoji:"↔️", dur:30, sides:2, cue:"Side to side across body. Hip abductors and adductors."},
      {id:"hip90",   name:"Hip 90/90",        emoji:"🧘", dur:60, sides:2, cue:"Sit tall. Both legs at 90°. Direct skating mobility."},
      {id:"dorsi",   name:"Ankle to Wall",    emoji:"🦶", dur:45, sides:2, cue:"Knee forward to wall. Heel stays down. Your ollie ceiling."},
      {id:"sqhold",  name:"Deep Squat Hold",  emoji:"🏋️", dur:90, sides:1, cue:"Sink in and hold. PF-friendly position. Heels down."},
      {id:"calf",    name:"Calf Stretch",     emoji:"💪", dur:30, sides:2, cue:"Heel to floor. Straight leg. Tight calves kill ankle mobility."},
    ]
  },
  post_skate: {
    id:"post_skate", name:"Post-Skate", emoji:"🏁", color:"#44ff88",
    tag:"Post-skate recovery + PF (if missed)",
    stretches:[
      {id:"calfroll",name:"Calf Foam Roll",     emoji:"🦵", dur:60,  sides:2, cue:"Roll slowly. Pause on tight spots. Direct ankle recovery."},
      {id:"quadroll",name:"Quad Foam Roll",     emoji:"🦿", dur:45,  sides:2, cue:"Hip to knee. Rotate foot to hit all fibers."},
      {id:"planfas", name:"Plantar Fascia",     emoji:"🦶", dur:60,  sides:2, cue:"Lacrosse ball or bottle. Heel to toes."},
      {id:"fold",    name:"Seated Fwd Fold",    emoji:"🙇", dur:180, sides:1, cue:"Hinge from hips. Hamstrings release. PF safe."},
      {id:"pigeon",  name:"Pigeon Pose",        emoji:"🕊️", dur:90,  sides:2, cue:"Shin parallel to mat. Hip drops. Glute opener."},
      {id:"fig4",    name:"Figure 4",           emoji:"4️⃣", dur:60,  sides:2, cue:"Ankle over knee. Pull toward chest. IT band."},
      {id:"twist",   name:"Spinal Twist",       emoji:"🌀", dur:60,  sides:2, cue:"Knee across body. Shoulder flat."},
      {id:"pfbaby",  name:"Happy Baby (PF)",    emoji:"👶", dur:120, sides:1, cue:"Rock gently. PF integration. Reverse Kegel on exhale."},
      {id:"pfchild", name:"Child's Pose (PF)",  emoji:"🙇‍♀️", dur:120, sides:1, cue:"PF integration. Breathe into pelvis. Reverse Kegel."},
      {id:"wall",    name:"Legs Up the Wall",   emoji:"🧘", dur:180, sides:1, cue:"Drains lactic acid. Full recovery reset."},
    ]
  }
};

const ld=(k)=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

function loadRoutines(){const s=ld("stretch_routines");if(s)return s;sv("stretch_routines",DEFAULTS);return DEFAULTS;}
function saveRoutines(r){sv("stretch_routines",r);}
function loadCounts(){return ld("stretch_counts")||{};}
function saveCounts(c){sv("stretch_counts",c);}
function loadDays(){return ld("stretch_days")||{};}  // dateStr → [routineId, ...]
function saveDays(d){sv("stretch_days",d);}
function today(){return new Date().toISOString().slice(0,10);}

function calcDaily(routineId){
  const days=loadDays();
  let n=0;const d=new Date();
  for(let i=0;i<365;i++){
    const ds=d.toISOString().slice(0,10);
    if((days[ds]||[]).includes(routineId))n++;
    else break;
    d.setDate(d.getDate()-1);
  }
  return n;
}

function didPFToday(){const days=loadDays();return (days[today()]||[]).includes("pf");}

function fmt(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function totalMins(stretches){return Math.round(stretches.reduce((a,b)=>a+(b.dur*(b.sides||1)),0)/60);}

function Ring({timeLeft,total,color}){
  const pct=total>0?timeLeft/total:1;
  const offset=CIRC*(1-pct);
  const ringColor=timeLeft<=10?"#ff4444":timeLeft<=30?"#ffaa00":color;
  return(
    <svg width="200" height="200" viewBox="0 0 200 200" style={{display:"block",margin:"0 auto"}}>
      <circle cx="100" cy="100" r="88" fill="none" stroke={BD} strokeWidth="6"/>
      <circle cx="100" cy="100" r="88" fill="none"
        stroke={ringColor} strokeWidth="6" strokeLinecap="round"
        strokeDasharray={CIRC} strokeDashoffset={offset}
        transform="rotate(-90 100 100)"
        style={{transition:"stroke-dashoffset 1s linear, stroke 0.3s"}}/>
      <text x="100" y="96" textAnchor="middle" fill={timeLeft<=10?"#ff4444":T}
        fontFamily="Space Mono" fontSize="42" fontWeight="700">{fmt(timeLeft)}</text>
      <text x="100" y="116" textAnchor="middle" fill={G}
        fontFamily="Space Mono" fontSize="10" letterSpacing="2">REMAINING</text>
    </svg>
  );
}

function App(){
  const [screen,setScreen]=useState("home"); // home | active | done | edit
  const [routines,setRoutines]=useState(()=>loadRoutines());
  const [counts,setCounts]=useState(()=>loadCounts());
  const [routineId,setRoutineId]=useState(null);
  const [idx,setIdx]=useState(0);
  const [side,setSide]=useState(1); // 1 or 2 if stretch has sides
  const [timeLeft,setTimeLeft]=useState(0);
  const [paused,setPaused]=useState(false);
  const [elapsed,setElapsed]=useState(0);
  const [completedRoutine,setCompletedRoutine]=useState(null);
  const [editTarget,setEditTarget]=useState(null); // routineId being edited
  const [editStretch,setEditStretch]=useState(null); // index of stretch being edited
  const [editName,setEditName]=useState("");
  const [editDur,setEditDur]=useState(0);
  const [editSides,setEditSides]=useState(1);
  const [editCue,setEditCue]=useState("");
  const [toast,setToast]=useState(null);

  const endRef=useRef(null);
  const rafRef=useRef(null);
  const startRef=useRef(null);
  const pausedAtRef=useRef(null);
  const pausedMsRef=useRef(0);
  const wakeLockRef=useRef(null);

  const routine=routineId?routines[routineId]:null;
  const stretches=routine?routine.stretches:[];
  const stretch=stretches[idx];

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),2500);}

  // ── Keep screen awake during session ──
  async function acquireWakeLock(){
    try{
      if("wakeLock" in navigator){
        wakeLockRef.current=await navigator.wakeLock.request("screen");
      }
    }catch(e){console.log("Wake lock failed",e);}
  }
  function releaseWakeLock(){
    if(wakeLockRef.current){
      wakeLockRef.current.release().catch(()=>{});
      wakeLockRef.current=null;
    }
  }
  // Reacquire if visibility changes back
  useEffect(()=>{
    const onVis=()=>{
      if(document.visibilityState==="visible"&&screen==="active"){
        acquireWakeLock();
      }
    };
    document.addEventListener("visibilitychange",onVis);
    return()=>document.removeEventListener("visibilitychange",onVis);
  },[screen]);

  const tick=useCallback(()=>{
    if(!endRef.current)return;
    const rem=Math.max(0,Math.round((endRef.current-Date.now())/1000));
    setTimeLeft(rem);
    if(rem===10&&navigator.vibrate)navigator.vibrate([100]);
    if(rem===0){
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      advanceTo(idx,side);
      return;
    }
    rafRef.current=requestAnimationFrame(tick);
  },[idx,side,stretches.length]);

  useEffect(()=>{
    if(screen!=="active"||!stretch||paused)return;
    cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafRef.current);
  },[tick,screen,paused,idx,side]);

  function advanceTo(currentIdx,currentSide){
    cancelAnimationFrame(rafRef.current);
    const cur=stretches[currentIdx];
    const totalSides=cur.sides||1;
    // If current stretch has another side, advance to next side
    if(currentSide<totalSides){
      const next=currentSide+1;
      endRef.current=Date.now()+cur.dur*1000;
      setTimeLeft(cur.dur);
      setSide(next);
      setPaused(false);
      if(navigator.vibrate)navigator.vibrate([60,30,60]);
      rafRef.current=requestAnimationFrame(tick);
      return;
    }
    // Move to next stretch
    const nextIdx=currentIdx+1;
    if(nextIdx>=stretches.length){
      finish();
      return;
    }
    const nextStretch=stretches[nextIdx];
    // Increment count for completed stretch
    const c={...counts};c[cur.id]=(c[cur.id]||0)+1;setCounts(c);saveCounts(c);
    endRef.current=Date.now()+nextStretch.dur*1000;
    setTimeLeft(nextStretch.dur);
    setIdx(nextIdx);
    setSide(1);
    setPaused(false);
    if(navigator.vibrate)navigator.vibrate([80,40,80]);
    rafRef.current=requestAnimationFrame(tick);
  }

  function startRoutine(id){
    const r=routines[id];
    setRoutineId(id);
    setIdx(0);setSide(1);setPaused(false);
    pausedMsRef.current=0;
    startRef.current=Date.now();
    const dur=r.stretches[0].dur;
    endRef.current=Date.now()+dur*1000;
    setTimeLeft(dur);
    setScreen("active");
    acquireWakeLock();
    if(navigator.vibrate)navigator.vibrate([50]);
    ping(r.emoji+" "+r.name+" Started",r.tag+" — "+r.stretches.length+" stretches","person_in_lotus_position");
  }

  function togglePause(){
    if(paused){
      const ms=Date.now()-pausedAtRef.current;
      pausedMsRef.current+=ms;
      endRef.current+=ms;
      pausedAtRef.current=null;
      setPaused(false);
    } else {
      cancelAnimationFrame(rafRef.current);
      pausedAtRef.current=Date.now();
      setPaused(true);
    }
  }

  async function finish(){
    releaseWakeLock();
    const el=Math.round((Date.now()-startRef.current-pausedMsRef.current)/1000);
    setElapsed(el);
    setCompletedRoutine(routine);
    // Count last stretch too
    if(stretches[idx]){const c={...counts};c[stretches[idx].id]=(c[stretches[idx].id]||0)+1;setCounts(c);saveCounts(c);}
    // Mark routine done today
    const days=loadDays();
    days[today()]=[...new Set([...(days[today()]||[]),routine.id])];
    saveDays(days);
    setScreen("done");
    if(navigator.vibrate)navigator.vibrate([100,50,100,50,300]);
    await ping(
      routine.emoji+" "+routine.name+" Complete",
      routine.tag+" done — "+stretches.length+" stretches, "+Math.round(el/60)+" min",
      "person_in_lotus_position"
    );
    await ping("STRETCH_DATA",JSON.stringify({
      routine:routine.id,routineName:routine.name,
      stretches:stretches.length,duration:el,
      date:today(),timestamp:Date.now()
    }),"data");
  }

  function openEdit(rid,stretchIdx){
    setEditTarget(rid);setEditStretch(stretchIdx);
    const s=routines[rid].stretches[stretchIdx];
    setEditName(s.name);setEditDur(s.dur);setEditSides(s.sides||1);setEditCue(s.cue);
  }

  function saveEdit(){
    if(!editName.trim())return;
    const r={...routines};
    const arr=[...r[editTarget].stretches];
    arr[editStretch]={...arr[editStretch],name:editName.trim(),dur:Number(editDur),sides:Number(editSides),cue:editCue};
    r[editTarget]={...r[editTarget],stretches:arr};
    setRoutines(r);saveRoutines(r);
    setEditStretch(null);showToast("Saved: "+editName.trim());
  }

  function resetRoutines(){
    if(!confirm("Reset all stretches to defaults? This removes your custom edits."))return;
    setRoutines(DEFAULTS);saveRoutines(DEFAULTS);showToast("Reset to defaults");
  }

  const mono=(ex={})=>({fontFamily:"Space Mono",fontSize:10,letterSpacing:2,color:G,...ex});
  const row=(ex={})=>({display:"flex",alignItems:"center",...ex});

  // ── EDIT STRETCH MODAL ──
  if(editStretch!==null){
    return(
      <div style={{background:BG,color:T,minHeight:"100vh",fontFamily:"Syne,sans-serif",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
        <div style={{padding:"44px 24px 20px",...row({justifyContent:"space-between"})}}>
          <div style={{fontSize:20,fontWeight:800}}>Edit Stretch</div>
          <button onClick={()=>setEditStretch(null)} style={mono({background:"none",border:"1px solid "+BD,borderRadius:8,padding:"8px 14px",cursor:"pointer"})}>CANCEL</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 24px 40px"}}>
          <div style={{marginBottom:16}}>
            <div style={mono({display:"block",marginBottom:8})}>NAME</div>
            <input value={editName} onChange={e=>setEditName(e.target.value)}
              style={{width:"100%",background:S,border:"1px solid "+BD,borderRadius:10,padding:"14px",color:T,fontFamily:"Syne",fontSize:15,outline:"none"}}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={mono({display:"block",marginBottom:8})}>DURATION (SECONDS PER SIDE)</div>
            <input type="number" inputMode="numeric" value={editDur} onChange={e=>setEditDur(e.target.value)}
              style={{width:"100%",background:S,border:"1px solid "+BD,borderRadius:10,padding:"14px",color:T,fontFamily:"Space Mono",fontSize:18,outline:"none"}}/>
            <div style={mono({marginTop:6,color:M})}>= {Math.floor(editDur/60)}m {editDur%60}s per side</div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={mono({display:"block",marginBottom:8})}>SIDES</div>
            <div style={row({gap:8})}>
              {[1,2].map(n=>(
                <button key={n} onClick={()=>setEditSides(n)}
                  style={{flex:1,padding:"14px",borderRadius:10,cursor:"pointer",fontFamily:"Syne",fontWeight:700,fontSize:14,border:"1px solid "+(editSides==n?"#c8ff00":BD),background:editSides==n?"rgba(200,255,0,0.1)":"transparent",color:editSides==n?"#c8ff00":M}}>
                  {n===1?"1 (both)":"2 (each side)"}
                </button>
              ))}
            </div>
            <div style={mono({marginTop:6,color:M})}>Total time: {editDur*editSides}s ({Math.floor(editDur*editSides/60)}m {(editDur*editSides)%60}s)</div>
          </div>
          <div style={{marginBottom:28}}>
            <div style={mono({display:"block",marginBottom:8})}>CUE</div>
            <textarea value={editCue} onChange={e=>setEditCue(e.target.value)}
              style={{width:"100%",background:S,border:"1px solid "+BD,borderRadius:10,padding:"14px",color:T,fontFamily:"Syne",fontSize:13,outline:"none",resize:"none",minHeight:80}}/>
          </div>
          <button onClick={saveEdit}
            style={{width:"100%",background:"#c8ff00",color:"#000",border:"none",borderRadius:14,padding:18,fontFamily:"Syne",fontWeight:800,fontSize:16,cursor:"pointer"}}>
            SAVE CHANGES
          </button>
        </div>
      </div>
    );
  }

  // ── EDIT ROUTINE LIST ──
  if(screen==="edit"&&editTarget){
    const r=routines[editTarget];
    return(
      <div style={{background:BG,color:T,minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Syne,sans-serif",maxWidth:480,margin:"0 auto"}}>
        <div style={{padding:"44px 24px 20px",...row({justifyContent:"space-between"})}}>
          <button onClick={()=>{setScreen("home");setEditTarget(null);}} style={mono({background:"none",border:"1px solid "+BD,borderRadius:8,padding:"8px 14px",cursor:"pointer"})}>← BACK</button>
          <div style={mono({color:r.color})}>{r.emoji} {r.name.toUpperCase()}</div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 20px 40px"}}>
          <div style={mono({display:"block",marginBottom:14})}>TAP A STRETCH TO EDIT</div>
          {r.stretches.map((s,i)=>(
            <div key={s.id} onClick={()=>openEdit(editTarget,i)}
              style={{...row({gap:12}),padding:"14px 16px",marginBottom:8,background:S,border:"1px solid "+BD,borderRadius:12,cursor:"pointer"}}>
              <span style={{fontSize:22}}>{s.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700}}>{s.name}</div>
                <div style={mono({fontSize:9,marginTop:3})}>{fmt(s.dur)}{s.sides>1?" × "+s.sides+" sides":""} · {counts[s.id]||0} total reps</div>
              </div>
              <span style={{color:G,fontSize:16}}>✏️</span>
            </div>
          ))}
          <button onClick={resetRoutines}
            style={{width:"100%",marginTop:20,background:"none",color:"#ff4444",border:"1px solid rgba(255,68,68,0.3)",borderRadius:12,padding:14,fontFamily:"Syne",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            RESET ALL TO DEFAULTS
          </button>
        </div>
      </div>
    );
  }

  // ── DONE ──
  if(screen==="done") return(
    <div style={{background:BG,color:T,minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Syne,sans-serif",maxWidth:480,margin:"0 auto",alignItems:"center",justifyContent:"center",padding:"40px 32px",textAlign:"center"}}>
      <div style={{fontSize:72,marginBottom:16,animation:"pop 0.4s ease"}}>{completedRoutine?.emoji||"🔥"}</div>
      <div style={{fontSize:40,fontWeight:800,color:completedRoutine?.color||"#c8ff00",marginBottom:8}}>DONE.</div>
      <div style={{fontSize:15,color:M,marginBottom:8}}>{completedRoutine?.name} complete</div>
      <div style={mono({color:G,marginBottom:32})}>SENT TO TARJM ✓</div>
      <div style={{display:"flex",gap:32,marginBottom:32}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"Space Mono",fontSize:36,color:T}}>{Math.round(elapsed/60)}</div>
          <div style={mono({fontSize:8,marginTop:4})}>MINUTES</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"Space Mono",fontSize:36,color:T}}>{stretches.length}</div>
          <div style={mono({fontSize:8,marginTop:4})}>STRETCHES</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"Space Mono",fontSize:36,color:completedRoutine?.color||"#c8ff00"}}>{calcDaily(completedRoutine?.id)}</div>
          <div style={mono({fontSize:8,marginTop:4})}>DAY STREAK</div>
        </div>
      </div>
      <button onClick={()=>{setScreen("home");setRoutineId(null);setIdx(0);setSide(1);}}
        style={{width:"100%",maxWidth:320,background:completedRoutine?.color||"#c8ff00",color:"#000",border:"none",borderRadius:16,padding:20,fontFamily:"Syne",fontWeight:800,fontSize:17,cursor:"pointer"}}>
        BACK TO HOME
      </button>
    </div>
  );

  // ── ACTIVE ──
  if(screen==="active"&&stretch){
    const totalSides=stretch.sides||1;
    const sideLabel=totalSides>1?(side===1?"LEFT / FIRST SIDE":"RIGHT / SECOND SIDE"):null;
    return(
      <div style={{background:BG,color:T,minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Syne,sans-serif",maxWidth:480,margin:"0 auto"}}>
        <div style={{padding:"44px 24px 12px",...row({justifyContent:"space-between"})}}>
          <button onClick={()=>{cancelAnimationFrame(rafRef.current);releaseWakeLock();setScreen("home");setRoutineId(null);}}
            style={mono({background:"none",border:"1px solid "+BD,borderRadius:8,padding:"8px 14px",cursor:"pointer"})}>QUIT</button>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
            <div style={mono({color:routine.color})}>{routine.emoji} {routine.name.toUpperCase()}</div>
            <div style={mono()}>{idx+1} / {stretches.length}</div>
          </div>
        </div>
        <div style={{padding:"0 24px",marginBottom:4}}>
          <div style={{height:2,background:BD,borderRadius:2}}>
            <div style={{height:"100%",width:`${(idx/stretches.length)*100}%`,background:routine.color,borderRadius:2,transition:"width 0.4s"}}/>
          </div>
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 24px 8px",overflowY:"auto"}}>
          <div style={{fontSize:56,marginBottom:6}}>{stretch.emoji}</div>
          <div style={{fontSize:24,fontWeight:800,textAlign:"center",marginBottom:6}}>{stretch.name}</div>
          {sideLabel&&(
            <div style={{fontFamily:"Space Mono",fontSize:11,color:routine.color,letterSpacing:2,padding:"4px 12px",background:routine.color+"18",borderRadius:6,marginBottom:8,animation:"pop 0.3s ease"}}>
              {sideLabel} ({side}/{totalSides})
            </div>
          )}
          <div style={{fontSize:14,color:M,textAlign:"center",maxWidth:300,lineHeight:1.6,marginBottom:18}}>{stretch.cue}</div>
          <Ring timeLeft={timeLeft} total={stretch.dur} color={routine.color}/>
          <div style={mono({color:G,marginTop:8})}>STAYS AWAKE WHILE RUNNING 🔒</div>
          <div style={{display:"flex",gap:12,width:"100%",maxWidth:320,marginTop:20}}>
            <button onClick={togglePause}
              style={{flex:0.7,padding:16,borderRadius:12,border:"1px solid "+BD,background:S,color:T,fontFamily:"Syne",fontWeight:700,fontSize:14,cursor:"pointer"}}>
              {paused?"RESUME":"PAUSE"}
            </button>
            <button onClick={()=>advanceTo(idx,side)}
              style={{flex:1.3,padding:16,borderRadius:12,border:"none",background:routine.color,color:"#000",fontFamily:"Syne",fontWeight:800,fontSize:15,cursor:"pointer"}}>
              {(idx>=stretches.length-1&&side>=totalSides)?"FINISH ✓":"NEXT →"}
            </button>
          </div>
        </div>
        <div style={{padding:"12px 20px 32px"}}>
          <div style={mono({display:"block",textAlign:"center",marginBottom:10})}>UP NEXT</div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
            {stretches.map((s,i)=>(
              <div key={s.id} style={{flexShrink:0,background:i<idx?BG:S,border:"1px solid "+(i===idx?routine.color:BD),borderRadius:8,padding:"7px 12px",fontSize:11,color:i<idx?G:i===idx?T:G,opacity:i<idx?0.4:1,whiteSpace:"nowrap"}}>
                {s.emoji} {s.name}{s.sides>1?" ×2":""}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── HOME ──
  const pfMissed=!didPFToday();
  return(
    <div style={{background:BG,color:T,minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Syne,sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
      {toast&&<div style={{position:"fixed",top:56,left:"50%",transform:"translateX(-50%)",background:"#1a1a1a",border:"1px solid #333",borderRadius:10,padding:"10px 18px",fontFamily:"Space Mono",fontSize:11,color:T,zIndex:999,whiteSpace:"nowrap",letterSpacing:1,animation:"slidein 0.2s ease"}}>{toast}</div>}
      <div style={{padding:"44px 24px 20px",borderBottom:"1px solid "+BD}}>
        <div style={mono({display:"block",marginBottom:8})}>DAILY PROTOCOL</div>
        <div style={{fontSize:32,fontWeight:800,lineHeight:1}}>Stretch<br/><span style={{color:"#c8ff00"}}>Timer</span></div>
      </div>
      {pfMissed&&(
        <div style={{margin:"16px 20px 0",background:"rgba(200,255,0,0.06)",border:"1px solid rgba(200,255,0,0.3)",borderRadius:12,padding:"12px 14px"}}>
          <div style={mono({color:"#c8ff00",display:"block",marginBottom:4})}>PF NOT DONE TODAY</div>
          <div style={{fontSize:12,color:M}}>Post-skate routine includes 2 PF stretches at the end so you stay covered.</div>
        </div>
      )}
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px 40px",display:"flex",flexDirection:"column",gap:14}}>
        {Object.values(routines).map(r=>{
          const streak=calcDaily(r.id);
          const doneToday=(loadDays()[today()]||[]).includes(r.id);
          return(
            <div key={r.id} style={{background:S,border:"1px solid "+(doneToday?r.color:BD),borderRadius:16,padding:"18px 20px",position:"relative"}}>
              <div onClick={()=>startRoutine(r.id)} style={{cursor:"pointer"}}>
                <div style={{...row({justifyContent:"space-between"}),marginBottom:8}}>
                  <div>
                    <div style={{fontSize:26,marginBottom:4}}>{r.emoji}</div>
                    <div style={{fontSize:19,fontWeight:800}}>{r.name}{doneToday&&<span style={{fontSize:14,marginLeft:8,color:r.color}}>✓</span>}</div>
                    <div style={{fontFamily:"Space Mono",fontSize:10,color:r.color,marginTop:4,letterSpacing:1}}>
                      {r.stretches.length} stretches · {totalMins(r.stretches)} min
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={mono({color:r.color,marginBottom:2})}>{streak}d 🔥</div>
                    <div style={{fontFamily:"Space Mono",fontSize:9,color:r.color,border:"1px solid "+r.color,borderRadius:8,padding:"5px 10px"}}>START →</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                  {r.stretches.map((s,i)=>(
                    <div key={i} style={{fontFamily:"Space Mono",fontSize:8,color:G,background:BD,borderRadius:6,padding:"3px 7px"}}>
                      {s.emoji} {s.name}{s.sides>1?" ×2":""}
                    </div>
                  ))}
                </div>
              </div>
              <button onClick={()=>{setEditTarget(r.id);setScreen("edit");}}
                style={{position:"absolute",top:14,right:14,background:"none",border:"1px solid "+BD,borderRadius:8,padding:"6px 10px",fontFamily:"Space Mono",fontSize:9,color:G,cursor:"pointer",letterSpacing:1}}>
                ✏️ EDIT
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
