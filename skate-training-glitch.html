  async set(key,value){localStorage.setItem(key,value);return{key,value};},
  async list(prefix){const keys=Object.keys(localStorage).filter(k=>k.startsWith(prefix));return{keys};}

async function ping(title,msg,tags){
  try{
    await fetch("https://ntfy.sh/"+NTFY,{
      method:"POST",body:msg,
      headers:{Title:title,Priority:"3",Tags:tags||"skateboard"}
    });
  }catch{}
}

  const [sessionStart,setSessionStart]=useState(null);

  const sess=SESSIONS.find(s=>s.id===sessionId);
  const ex=sess?.ex[exIdx];
  const totalSets=ex?.s||1;

  function startSession(id){
    setSessionId(id);setExIdx(0);setSetNum(1);setExpanded(null);
    setSessionStart(Date.now());
    setScreen("session");
    if(navigator.vibrate)navigator.vibrate([50]);
  }

  async function nextSet(){
    if(navigator.vibrate)navigator.vibrate([60]);
    await ping(ex.n+" set "+setNum,sess.name+" in progress","skateboard");
    if(setNum<totalSets){
      setSetNum(n=>n+1);
    }else if(exIdx<sess.ex.length-1){
      setExIdx(i=>i+1);setSetNum(1);setExpanded(null);
      if(navigator.vibrate)navigator.vibrate([80,40,80]);
    }else{
      finishSession();
    }
  }

  async function finishSession(){
    const elapsed=Math.round((Date.now()-sessionStart)/1000);
    const s={date:dateStr(),type:"skate-training",session:sess.name,duration:elapsed,exercises:sess.ex.length};
    setDone(s);
    try{
      let log=[];
      try{const x=await storage.get("tarjm:all");if(x)log=JSON.parse(x.value);}catch{}
      log.unshift({appType:"skate-training",...s});
      await storage.set("tarjm:all",JSON.stringify(log.slice(0,50)));
    }catch{}
    await ping("🛹 Skate Training Done",sess.name+" complete — "+sess.ex.length+" exercises","skateboard");
    if(navigator.vibrate)navigator.vibrate([100,50,100,50,300]);
    setScreen("done");
  }

    try{
