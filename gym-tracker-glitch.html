// ── LocalStorage storage shim (works on Glitch) ──
const storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    if (v === null) throw new Error('not found');
    return { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value };
  },
  async list(prefix) {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
    return { keys };
  }
};

}

function dateStr(){return new Date().toISOString().slice(0,10);}

function GymTracker(){
  const [screen,setScreen]=useState("home");
  const [dIdx,setDIdx]=useState(0);
  const [wIdx,setWIdx]=useState(0);
  const [eIdx,setEIdx]=useState(0);
  const [weights,setWeights]=useState({});
  const [prevW,setPrevW]=useState({});
  const [done,setDone]=useState(null);
  const [expandedEx,setExpandedEx]=useState(null);
  const [report,setReport]=useState("");
  const [showRep,setShowRep]=useState(false);
  const [copied,setCopied]=useState(false);

  const day=DAYS[dIdx];
  const warmupEx=day.warmup[wIdx];
  const ex=day.ex[eIdx];
  const prevArr=prevW[ex?.id]||[];
  const curArr=weights[ex?.id]||[];

  async function startDay(i){
    setDIdx(i);setWIdx(0);setEIdx(0);setExpandedEx(null);
    const init={};
    DAYS[i].ex.forEach(e=>{init[e.id]=Array(e.s).fill("");});
    setWeights(init);
    const p={};
    try{
      const res=await storage.list("gym:");
      if(res&&res.keys.length){
        const keys=res.keys.filter(k=>k.includes(DAYS[i].id)&&!k.includes(dateStr())).sort().reverse();
        if(keys.length){
          const d=await storage.get(keys[0]);
          if(d) JSON.parse(d.value).ex.forEach(e=>{p[e.id]=e.weights;});
        }
      }
    }catch{}
    setPrevW(p);
    setScreen("warmup");
  }

  async function nextWarmup(){
    if(wIdx>=day.warmup.length-1){
      setScreen("workout");
      await ping("Warmup Done",day.name+" warmup complete","white_check_mark");
    }
    else setWIdx(i=>i+1);
  }

  function setW(id,i,v){
    setWeights(w=>{const a=[...(w[id]||[])];a[i]=v;return{...w,[id]:a};});
  }

  async function nextEx(){
    // Ping current exercise with weights before advancing
    if(ex){
      const w=(weights[ex.id]||[]).filter(Boolean);
      if(w.length&&!ex.bw){
        await ping(ex.n,ex.s+"×"+ex.r+" — "+w.join("/")+"lb","muscle");
      }
    }
    if(eIdx>=day.ex.length-1){
      const s={date:dateStr(),day:day.name,dayId:day.id,
        ex:day.ex.map(e=>({id:e.id,name:e.n,target:`${e.s}×${e.r}`,weights:weights[e.id]||[]}))};
      setDone(s);
      try{
        await storage.set(`gym:${dateStr()}:${day.id}`,JSON.stringify(s));
        let log=[];
        try{const x=await storage.get("tarjm:all");if(x)log=JSON.parse(x.value);}catch{}
        log.unshift({type:"gym",...s});
        await storage.set("tarjm:all",JSON.stringify(log.slice(0,50)));
      }catch{}
      await ping("💪 Gym Done",day.name+" — "+day.ex.length+" exercises logged","muscle");
      setScreen("done");
    }else{setEIdx(i=>i+1);setExpandedEx(null);}
  }

  async function loadReport(){
    try{
      const r=await storage.get("tarjm:all");
      if(!r){setReport("No sessions logged yet.");return;}
      const log=JSON.parse(r.value).filter(s=>s.type==="gym");
      if(!log.length){setReport("No gym sessions yet.");return;}
      setReport(["=== GYM LOG FOR TARJM ===",
        ...log.slice(0,10).map(s=>`\n📅 ${s.date} — ${s.day}\n`+
          s.ex.map(e=>{const w=(e.weights||[]).filter(Boolean);
            return`  ${e.name} (${e.target}): ${w.length?w.join(" / ")+"lb":"—"}`;
          }).join("\n"))
      ].join("\n"));
    }catch(e){setReport("Error: "+e.message);}
  }

  const dot=(n)=>Array.from({length:5},(_,i)=>(
    React.createElement('span',{key:i,style:{display:"inline-block",width:8,height:8,borderRadius:"50%",background:i<n?EFFORT_COLORS[n]:BD,marginRight:3,verticalAlign:"middle"}})
  ));

  const btn=(txt,onClick,style={})=>React.createElement('button',{onClick,style:{cursor:"pointer",fontFamily:"Syne",border:"none",...style}},txt);

  const Hdr=()=>React.createElement('div',{style:{padding:"48px 24px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
    btn("QUIT",()=>setScreen("home"),{fontFamily:"Space Mono",fontSize:10,color:G,background:"none",border:`1px solid ${BD}`,borderRadius:8,padding:"8px 14px",letterSpacing:1}),
    React.createElement('span',{style:{fontFamily:"Space Mono",fontSize:11,letterSpacing:2,color:G}},
      screen==="warmup"?`WARMUP ${wIdx+1} / ${day.warmup.length}`:`${eIdx+1} / ${day.ex.length}`)
  );

  const Bar=(pct,color=A)=>React.createElement('div',{style:{padding:"0 24px",marginBottom:16}},
    React.createElement('div',{style:{height:2,background:BD,borderRadius:2}},
      React.createElement('div',{style:{height:"100%",width:`${pct*100}%`,background:color,borderRadius:2,transition:"width 0.4s"}}))
  );

  // HOME
  if(screen==="home") return React.createElement('div',{style:{background:BG,color:T,minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Syne"}},
    React.createElement('div',{style:{padding:"40px 24px 20px",borderBottom:`1px solid ${BD}`}},
      React.createElement('span',{style:{fontFamily:"Space Mono",fontSize:10,letterSpacing:3,color:G,display:"block",marginBottom:8}},"GYM TRACKER"),
      React.createElement('div',{style:{fontSize:34,fontWeight:800,lineHeight:1.1}},
        "Gym",React.createElement('br'),React.createElement('span',{style:{color:A}},"Program"))),
    React.createElement('div',{style:{flex:1,padding:16,overflowY:"auto",display:"flex",flexDirection:"column",gap:10}},
      ...DAYS.map((d,i)=>btn(
        React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",width:"100%",gap:12}},
          React.createElement('div',null,
            React.createElement('span',{style:{fontFamily:"Space Mono",fontSize:10,color:G,letterSpacing:2,display:"block",marginBottom:4}},d.label),
            React.createElement('div',{style:{fontSize:20,fontWeight:800,marginBottom:4}},`${d.emoji} ${d.name}`),
            React.createElement('div',{style:{fontSize:12,color:M,lineHeight:1.4,marginBottom:6}},d.note),
            React.createElement('div',{style:{fontFamily:"Space Mono",fontSize:10,color:G}},`${d.warmup.length} warmup · ${d.ex.length} exercises`)),
          React.createElement('span',{style:{fontSize:20,color:A,flexShrink:0,marginTop:4}},"→")),
        ()=>startDay(i),{display:"flex",justifyContent:"space-between",padding:"18px 20px",background:S,border:`1px solid ${BD}`,borderRadius:14,color:T,textAlign:"left",fontFamily:"Syne",width:"100%"})),
      btn(
        React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%"}},
          React.createElement('div',{style:{fontSize:14,fontWeight:700}},"🤖 Tarjm Report"),
          React.createElement('div',{style:{fontFamily:"Space Mono",fontSize:10,color:G}},"last 10 →")),
        async()=>{await loadReport();setShowRep(true);},
        {display:"flex",padding:"18px 20px",background:S,border:`1px dashed ${BD}`,borderRadius:14,color:T,textAlign:"left",width:"100%"})),
    showRep&&React.createElement('div',{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"flex-end",padding:20,zIndex:100}},
